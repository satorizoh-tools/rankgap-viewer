<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RankGap Viewer</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="card">
  <h2 id="title">イベント名</h2>

  <div class="label">順位</div>
  <div id="rank" class="value">--</div>

  <div class="label">ポイント</div>
  <div id="points" class="value">--</div>

  <div class="label">15位まで</div>
  <div id="diff15" class="value">--</div>

  <div class="label">30位まで</div>
  <div id="diff30" class="value">--</div>

  <div class="control-group">
    <div class="controls auto-row">
      <label class="auto-label" for="autoIntervalSec">
        <input id="autoEnabled" type="checkbox" checked>
        <span>Auto更新</span>
        <input id="autoIntervalSec" class="auto-number" type="number" min="10" max="600" step="1" value="30" inputmode="numeric">
        <span>秒</span>
        <span class="auto-range">(10〜600)</span>
      </label>
    </div>

    <div class="controls button-row">
      <button id="refreshBtn" type="button"><span class="btn-label">今すぐ更新</span></button>
      <button id="copyBtn" type="button">コメントコピー</button>
    </div>
  </div>

  <div class="status-group">
    <div id="stateLine" class="state-line"></div>
    <div id="lastUpdateLine" class="last-update">Last Update: --</div>
  </div>

  <div id="commentWrap" class="comment-wrap">
    <button id="commentCloseBtn" class="comment-close" type="button" aria-label="閉じる">×</button>
    <textarea id="comment" readonly></textarea>
  </div>

  <div id="error" class="error"></div>
</div>

<script src="./api.js"></script>
<script src="./timeLogic.js"></script>
<script src="./app.js"></script>

<div id="progress-bar-container" style="height:2px;background:#e0f2ff;margin-top:4px;position:relative;overflow:hidden;">
  <div id="progress-bar" style="height:100%;width:0%;background:#7ecbff;position:absolute;left:0;top:0;"></div>
  <div id="progress-flow" style="height:100%;width:30%;position:absolute;left:-30%;top:0;background:linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);"></div>
</div>

</body>
</html>
